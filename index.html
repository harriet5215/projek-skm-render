<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Telah Berpindah</title>

    <meta http-equiv="refresh" content="0; url=http://elocationstaff.rf.gd/">

    <script>
        window.location.href = "http://elocationstaff.rf.gd/";
    </script>

    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f4f9;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .message-box {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 400px;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #0056b3;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        a { color: #0056b3; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="message-box">
        <h2 style="color: #333;">Sistem Berpindah 🚀</h2>
        <p style="color: #666;">Sistem Pergerakan Kakitangan SKM kini mempunyai alamat baru yang lebih stabil.</p>
        
        <div class="loader"></div>
        
        <p>Anda akan dibawa ke alamat baru sebentar lagi...</p>
        <p style="font-size: 0.8em; color: #999;">Jika tidak berpindah secara automatik, sila klik pautan di bawah:</p>
        <a href="http://elocationstaff.rf.gd/">elocationstaff.rf.gd</a>
    </div>

</body>
</html>
